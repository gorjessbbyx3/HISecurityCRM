
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hawaii Security Enterprise - Advanced Security Management Platform</title>
    <meta name="description" content="Enterprise-grade security management system for Hawaii-based professional security services. Advanced client management, real-time monitoring, patrol coordination, and comprehensive security operations." />
    <meta name="keywords" content="security management, enterprise security, Hawaii security, patrol management, incident reporting, client portal, security operations center" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Hawaii Security Enterprise" />
    <meta property="og:description" content="Professional security management platform with advanced monitoring and operational capabilities" />
    <meta property="og:type" content="website" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Roboto+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Enhanced Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1M12,3.18L19,6.3V11C19,15.5 16.18,19.82 12,20.95C7.82,19.82 5,15.5 5,11V6.3L12,3.18Z' stroke='%23ffffff' stroke-width='0.5' fill='%233b82f6'/></svg>">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1M12,3.18L19,6.3V11C19,15.5 16.18,19.82 12,20.95C7.82,19.82 5,15.5 5,11V6.3L12,3.18Z'/></svg>">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#3b82f6" />
    
    <!-- Viewport Settings for Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Preload Critical Resources -->
    <link rel="preload" href="/src/index.css" as="style">
    <link rel="preload" href="/src/main.tsx" as="script">
    
    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  </head>
  <body class="bg-slate-950 text-white font-inter antialiased overflow-x-hidden">
    <!-- Loading Screen -->
    <div id="loading-screen" class="fixed inset-0 bg-slate-950 flex items-center justify-center z-50 overflow-hidden">
      <!-- Animated Background -->
      <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-blue-950/20 to-slate-950">
        <div class="absolute top-0 left-0 w-full h-full">
          <div class="absolute top-10 left-10 w-2 h-2 bg-blue-400 rounded-full opacity-60 animate-ping" style="animation-delay: 0s;"></div>
          <div class="absolute top-32 right-20 w-1 h-1 bg-indigo-400 rounded-full opacity-40 animate-ping" style="animation-delay: 1s;"></div>
          <div class="absolute bottom-20 left-32 w-1.5 h-1.5 bg-blue-500 rounded-full opacity-50 animate-ping" style="animation-delay: 2s;"></div>
          <div class="absolute bottom-40 right-10 w-1 h-1 bg-cyan-400 rounded-full opacity-30 animate-ping" style="animation-delay: 3s;"></div>
        </div>
      </div>
      
      <div class="text-center relative z-10">
        <!-- Animated Shield Icon -->
        <div class="relative mb-8">
          <div class="w-20 h-20 bg-gradient-to-br from-blue-500 via-indigo-600 to-purple-600 rounded-2xl flex items-center justify-center mx-auto shadow-2xl shadow-blue-500/40 transform hover:scale-110 transition-transform duration-500">
            <svg class="w-10 h-10 text-white animate-pulse" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1M12,3.18L19,6.3V11C19,15.5 16.18,19.82 12,20.95C7.82,19.82 5,15.5 5,11V6.3L12,3.18Z"/>
            </svg>
          </div>
          <!-- Rotating ring around shield -->
          <div class="absolute inset-0 w-24 h-24 border-2 border-blue-400/20 rounded-full animate-spin mx-auto" style="animation-duration: 3s;"></div>
          <div class="absolute inset-0 w-28 h-28 border border-indigo-400/10 rounded-full animate-spin mx-auto" style="animation-duration: 4s; animation-direction: reverse;"></div>
        </div>
        
        <!-- Animated Title -->
        <div class="mb-4">
          <div class="text-4xl font-black bg-gradient-to-r from-blue-400 via-indigo-400 to-cyan-400 bg-clip-text text-transparent mb-2 tracking-wider animate-pulse">
            <span class="inline-block animate-bounce" style="animation-delay: 0.1s;">S</span>
            <span class="inline-block animate-bounce" style="animation-delay: 0.2s;">T</span>
            <span class="inline-block animate-bounce" style="animation-delay: 0.3s;">R</span>
            <span class="inline-block animate-bounce" style="animation-delay: 0.4s;">E</span>
            <span class="inline-block animate-bounce" style="animation-delay: 0.5s;">E</span>
            <span class="inline-block animate-bounce" style="animation-delay: 0.6s;">T</span>
            <span class="mx-4"></span>
            <span class="inline-block animate-bounce" style="animation-delay: 0.7s;">P</span>
            <span class="inline-block animate-bounce" style="animation-delay: 0.8s;">A</span>
            <span class="inline-block animate-bounce" style="animation-delay: 0.9s;">T</span>
            <span class="inline-block animate-bounce" style="animation-delay: 1.0s;">R</span>
            <span class="inline-block animate-bounce" style="animation-delay: 1.1s;">O</span>
            <span class="inline-block animate-bounce" style="animation-delay: 1.2s;">L</span>
          </div>
          
          <!-- Subtitle with typewriter effect -->
          <div class="text-lg text-blue-300 font-bold uppercase tracking-[0.2em] mb-2">
            <span class="animate-pulse">Hawaii Security Enterprise</span>
          </div>
          
          <!-- Status text -->
          <div class="text-sm text-slate-400 font-medium">
            <span class="inline-block animate-pulse">Advanced Security Management Platform</span>
          </div>
        </div>
        
        <!-- Enhanced Progress Bar -->
        <div class="mt-8 w-64 h-2 bg-slate-800 rounded-full mx-auto overflow-hidden relative">
          <div class="absolute inset-0 bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 rounded-full animate-pulse transform scale-x-0 origin-left" style="animation: progressFill 3s ease-in-out infinite;"></div>
          <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent rounded-full" style="animation: shimmer 2s ease-in-out infinite;"></div>
        </div>
        
        <!-- Loading dots -->
        <div class="flex justify-center mt-6 space-x-2">
          <div class="w-2 h-2 bg-blue-400 rounded-full animate-bounce" style="animation-delay: 0s;"></div>
          <div class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce" style="animation-delay: 0.2s;"></div>
          <div class="w-2 h-2 bg-purple-400 rounded-full animate-bounce" style="animation-delay: 0.4s;"></div>
        </div>
      </div>
      
      <style>
        @keyframes progressFill {
          0% { transform: scaleX(0); }
          50% { transform: scaleX(0.7); }
          100% { transform: scaleX(1); }
        }
        
        @keyframes shimmer {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(200%); }
        }
        
        .animate-bounce {
          animation: bounce 2s ease-in-out infinite;
        }
      </style>
    </div>
    
    <!-- Main Application Container -->
    <div id="root" class="min-h-screen"></div>
    
    <!-- Loading Screen Script -->
    <script>
      // Hide loading screen once the app is ready
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingScreen = document.getElementById('loading-screen');
          if (loadingScreen) {
            loadingScreen.style.opacity = '0';
            loadingScreen.style.transition = 'opacity 0.5s ease-out';
            setTimeout(() => {
              loadingScreen.style.display = 'none';
            }, 500);
          }
        }, 1000);
      });
    </script>
    
    <!-- Main Application Script -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
